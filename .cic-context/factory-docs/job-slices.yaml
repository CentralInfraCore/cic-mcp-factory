    acceptance_gates:
      - "A real, runnable command/tool exists that transitions a specific candidate_id's trust, with a real Postgres test proving the transition actually happened (row re-read after the call)."
      - "Every transition is appended to an audit log (who/when/from-state/to-state/candidate_id), real test proving a row is written."
      - "An attempt to set canonical=true on a row not at trust='reviewed_shared' is rejected by this tool's own validation BEFORE hitting the DB CHECK constraint -- but the DB constraint itself remains the final authority, not bypassed."
      - "Report explicitly confirms this tool is operator-invoked, not triggered automatically by aggregation or weighting -- promotion stays human-review-only."
    required_evidence:
