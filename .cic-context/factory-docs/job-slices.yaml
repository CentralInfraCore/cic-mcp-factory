  - job_id: "shared-scoring-rework-001"
    phase: "7"
    target_repo: "cic-mcp-shared"
    change_type: "fix"
    status_after_merge: "candidate"
    goal: "Fix shared_core/aggregator.py's cross_session_score formula (currently sum(sum(per_session_normalized)), file:line 268-294, confirmed via grep to have no ON CONFLICT/upsert anywhere in the file) -- replace the unbounded per-session summation with an absolute minimum-relevance threshold, a per-session score cap (max or top-k weighted average instead of raw sum), a minimum-evidence-count gate, and an idempotent ON CONFLICT upsert keyed on a candidate fingerprint, so repeated aggregation runs update existing rows instead of inserting duplicates."
    required_context:
      - "shared_core/aggregator.py (full file, read before changing)"
      - "shared-cross-session-search-001 and shared-weighting-model-001 outputs (the original design this formula came from, NOT being thrown away wholesale -- this is a targeted fix, not a redesign from scratch)"
    output_files:
      - "output/shared-scoring-rework.md"
    acceptance_gates:
      - "Report cites the exact pre-change formula (file:line) and confirms via grep that no ON CONFLICT exists anywhere in aggregator.py before this job."
      - "A real Postgres test proves: running aggregation twice on the same input data does NOT create two candidate rows (idempotent upsert, fingerprint-keyed)."
      - "A real Postgres test proves: a single very-high-scoring session can no longer dominate the aggregate the way unbounded summation allowed -- before/after score comparison on the same fixture, both numbers quoted."
      - "A real test proves: evidence below the minimum-count gate does not produce a candidate row at all."
    required_evidence:
      - "grep -rn confirming no pre-existing ON CONFLICT, before the change."
      - "Real psql/pytest output for the idempotent-rerun proof and the before/after score-cap proof."
    forbidden_shortcuts:
      - "changing the trust/canonical CHECK constraint enforcement (already correct, out of scope, see shared-core-storage-implementation-001)"
      - "an upsert that silently discards provenance_refs from the previous row instead of merging/appending them"
      - "claiming the fix is 'proven' from the formula's code alone -- the idempotent-rerun and score-cap proofs must be from a real running Postgres"

