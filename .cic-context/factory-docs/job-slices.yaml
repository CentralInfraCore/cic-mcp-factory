    change_type: "fix"
    status_after_merge: "candidate"
    goal: "Add a LIMIT to the unbounded FOR UPDATE SKIP LOCKED selects in turn_projector.py and chunk_indexer.py (confirmed via grep: no LIMIT currently, one worker locks the entire pending/failed queue for job_type in a single transaction), add a statement_timeout safety net, and start populating the already-existing-but-unused locked_by/locked_at columns (turn_projector.py:113 explicitly scopes this out today) for observability -- plus expose pending-count/oldest-pending-age/dead_letter-count/attempts-histogram via a metrics view or MCP tool. This does NOT rebuild the claim/retry mechanism -- attempts/max_attempts/dead_letter already work and are already tested (turn_projector.py:235-246), that part is explicitly out of scope."
    required_context:
