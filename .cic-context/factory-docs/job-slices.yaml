    status_after_merge: "candidate"
    goal: "Build a review/promote/reject CLI or MCP tool driving shared_core.candidates.trust through mixed -> candidate -> reviewed_shared, or -> superseded/rejected, with an audit log of every transition -- the DB-level gate (canonical requires trust=reviewed_shared, already enforced, see shared-core-storage-implementation.md 'Canonical Constraint - Real Postgres Proof') currently has no operator-facing interface driving it."
