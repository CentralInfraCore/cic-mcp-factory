apiVersion: cic.factory/v1
kind: FactoryJobSliceList
metadata:
  created_at: "2026-06-20T09:20:00+02:00"
  purpose: "Claude/factory compatible job decomposition for cic-mcp-* implementation."
rules:
  normative_contract: ".cic-context/factory-docs/acceptance-contract.md"
  one_job_should_do:
    - "one repo target"
    - "one primary contract or implementation slice"
    - "one output report"
    - "one claim-evidence table"
  one_job_should_not_do:
    - "session and gateway implementation together"
    - "schema design and full runtime implementation together"
    - "historical import before ingress/storage contract is stable"
    - "deep shared-memory AI extraction inside session jobs"
  context_budget:
    max_input_sources: 5
    prefer_review_artifacts_over_raw_theads: true
    include_target_repo_paths: true
    include_exact_output_files: true
  mandatory_gates:
    - "target repo path is explicit"
    - "status_after_merge is justified"
    - "output filenames are explicit"
    - "claim-evidence table is required"
    - "forbidden shortcuts are listed"
    - "Definition of Done is checkable"
jobs:
  - job_id: "session-repo-baseline-audit-001"
    phase: "1A"
    target_repo: "cic-mcp-session"
    change_type: "enhancement"
    status_after_merge: "experimental"
    bootstrap_status: "done_out_of_band_2026-06-20"  # cic-mcp-session repo created from base-repo
                                                       # mcp/main, README/CLAUDE.md customized via PR.
                                                       # This job's audit can now run for real — the
                                                       # repo previously did not exist at all.
    goal: "Audit existing cic-mcp-session scaffold and classify what is implemented/scaffold/concept."
    required_context:
      - ".cic-context/factory-docs/architecture.md#cic-mcp-session"
      - ".cic-context/factory-docs/execution-phases.md#Phase 1A"
      - ".cic-context/corpus/normalized/thead-review-2026-06-20.yaml"
      - "target repo path for cic-mcp-session"
    output_files:
      - "output/session-baseline-audit.md"
    acceptance_gates:
      - "Report classifies every observed major component as implemented/scaffold/concept/missing."
      - "Every implemented claim has runtime or reachability evidence."
      - "Report includes a NO-GO list for anything unsafe to build on."
      - "Report proposes the next 3 factory jobs."
    required_evidence:
      - "File/path evidence for every existing component claim."
      - "Reachability evidence for any implemented/runtime claim."
      - "Explicit scaffold/concept classification."
    forbidden_shortcuts:
      - "file existence != implemented"
      - "README claim != runtime capability"

  - job_id: "gateway-repo-baseline-or-bootstrap-001"
    phase: "1B"
    target_repo: "cic-mcp-gateway"
    change_type: "new_capability"
    status_after_merge: "experimental"
    bootstrap_status: "done_out_of_band_2026-06-20"  # cic-mcp-gateway repo created from base-repo
                                                       # mcp/main, README/CLAUDE.md customized via PR.
                                                       # Remaining scope: audit + GatewayContextEnvelope
                                                       # boundary report, not bootstrap.
    goal: "Establish or audit cic-mcp-gateway as a separate component from day one."
    required_context:
      - ".cic-context/factory-docs/architecture.md#cic-mcp-gateway"
      - ".cic-context/factory-docs/execution-phases.md#Phase 1B"
      - ".cic-context/corpus/normalized/thead-review-2026-06-20.yaml"
    output_files:
      - "output/gateway-baseline.md"
    acceptance_gates:
      - "Report states whether repo exists or must be bootstrapped."
      - "Report defines minimal gateway responsibility without implementing session storage."
      - "Report contains source registry and GatewayContextEnvelope initial boundary."
      - "Report proposes next gateway contract job."
    required_evidence:
      - "Repo status: exists/scaffold/bootstrap-required."
      - "Minimal source registry and GatewayContextEnvelope responsibilities."
      - "Explicit statement that gateway is not a generic proxy."
    forbidden_shortcuts:
      - "route_query == search_all"
      - "gateway stores session raw data"

  - job_id: "session-ingress-envelope-contract-001"
    phase: "1A"
    target_repo: "cic-mcp-session"
    change_type: "new_capability"
    status_after_merge: "experimental"
    goal: "Define SessionIngressEnvelope schema and validation rules."
    required_context:
      - ".cic-context/factory-docs/architecture.md#Postgres-first elv"
      - ".cic-context/factory-docs/architecture.md#Trust modell"
      - ".cic-context/corpus/normalized/thead-review-2026-06-20.yaml"
      - ".cic-context/corpus/normalized/factory-systems-review-2026-06-20.yaml"
    output_files:
      - "output/session-ingress-envelope-contract.md"
      - "output/session-ingress-envelope.schema.yaml"
    acceptance_gates:
      - "Schema includes apiVersion, kind, event identity, provider identity, source, payload, trust and raw preservation fields."
      - "Schema forbids canonical=true and interpreted=true at ingress level."
      - "Report defines idempotency key construction."
      - "Report includes at least 2 valid and 2 invalid envelope examples."
    required_evidence:
      - "Envelope fields: provider, provider_session_id, event_name, timestamps, payload, trust, interpreted=false."
      - "Idempotency key strategy."
      - "Raw payload preservation rule."
    forbidden_shortcuts:
      - "hook semantically interprets decisions/claims"
      - "canonical=true allowed in session ingress"

  - job_id: "gateway-context-envelope-contract-001"
    phase: "1B"
    target_repo: "cic-mcp-gateway"
    change_type: "new_capability"
    status_after_merge: "experimental"
    goal: "Define GatewayContextEnvelope for agent-facing compiled context."
    required_context:
      - ".cic-context/factory-docs/architecture.md#cic-mcp-gateway"
      - ".cic-context/factory-docs/execution-phases.md#Phase 1B"
      - ".cic-context/corpus/normalized/thead-review-2026-06-20.yaml"
    output_files:
      - "output/gateway-context-envelope-contract.md"
      - "output/gateway-context-envelope.schema.yaml"
    acceptance_gates:
      - "Schema includes sources_used, trust_summary, conflicts, proof_requirements and refs."
      - "Report distinguishes canonical/workdir/session/shared sections."
      - "Report states gateway does not own raw storage or embedding store."
      - "Report includes at least 2 valid and 2 invalid envelope examples."
    required_evidence:
      - "Sources used, trust levels, conflicts, proof requirements, refs."
      - "Separation from source-specific MCP APIs."
    forbidden_shortcuts:
      - "gateway returns raw vector hits without trust envelope"

  - job_id: "session-postgres-storage-design-001"
    phase: "3"
    target_repo: "cic-mcp-session"
    change_type: "new_capability"
    status_after_merge: "experimental"
    goal: "Design PostgreSQL schemas for session_raw/session_core/session_idx/session_jobs/session_api."
    required_context:
      - ".cic-context/factory-docs/architecture.md#Schema szeparacio"
      - ".cic-context/factory-docs/architecture.md#Inheritance / partitioning allaspont"
      - ".cic-context/factory-docs/execution-phases.md#Phase 3"
    output_files:
      - "output/session-postgres-storage-design.md"
      - "output/session-postgres-schema.sql"
    acceptance_gates:
      - "SQL draft contains session_raw, session_core, session_idx, session_jobs and session_api schemas."
      - "Report explains trigger/outbox boundaries."
      - "Report lists indexes for session_id, metadata, FTS and vector lookup."
      - "Report explicitly decides partitioning/inheritance approach for v1."
      - "Report lists what remains outside Postgres in workers."
    required_evidence:
      - "DDL sketch for each schema."
      - "Trigger/outbox boundaries."
      - "FTS/vector/metadata index strategy."
      - "What remains in workers."
    forbidden_shortcuts:
      - "trigger calls external LLM/HTTP"
      - "one global chunks.pkl as live store"

  - job_id: "session-raw-event-store-001"
    phase: "3"
    target_repo: "cic-mcp-session"
    change_type: "new_capability"
    status_after_merge: "experimental"
    goal: "Implement the write-path that applies session-postgres-schema.sql against a real Postgres instance and persists SessionIngressEnvelope instances into session_raw.envelopes."
    prerequisites:
      - "session-ingress-envelope-contract-001"
      - "session-postgres-storage-design-001"
    required_context:
      - ".cic-context/factory-docs/architecture.md#Postgres-first elv"
      - ".cic-context/factory-docs/execution-phases.md#Phase 3"
    output_files:
      - "output/session-raw-event-store-report.md"
    acceptance_gates:
      - "Write-path code applies session-postgres-schema.sql against a real Postgres instance (docker-compose or ephemeral container) and all 5 schemas are created without error."
      - "A function/module accepts a SessionIngressEnvelope-shaped object and inserts it into session_raw.envelopes after validating required fields."
      - "Re-inserting the same idempotency_key is a no-op, not a duplicate row and not an unhandled exception."
      - "Attempting to persist canonical=true or interpreted=true is rejected without crashing the write path."
      - "Tests run against a real Postgres instance, not a mocked connection, and are reproducible by a documented command."
    required_evidence:
      - "Actual test run output: schema creation, insert, idempotency dedup, canonical/interpreted rejection — quoted, not paraphrased."
      - "The exact docker-compose/test-fixture setup used, reproducible by a documented command."
    forbidden_shortcuts:
      - "mocked database connection as proof of a working write-path"
      - "skipping the idempotency test because 'the UNIQUE constraint handles it'"

  - job_id: "session-turn-projector-001"
    phase: "3"
    target_repo: "cic-mcp-session"
    change_type: "new_capability"
    status_after_merge: "experimental"
    goal: "Implement a worker that consumes session_jobs.outbox (project_envelope jobs), projects session_raw.envelopes rows into session_core.sessions/turns, and marks outbox jobs done/failed/dead_letter."
    prerequisites:
      - "session-raw-event-store-001"
    required_context:
      - ".cic-context/factory-docs/architecture.md#Schema szeparacio"
      - ".cic-context/factory-docs/execution-phases.md#Phase 3"
    output_files:
      - "output/session-turn-projector-report.md"
    acceptance_gates:
      - "Worker reads pending session_jobs.outbox rows (job_type=project_envelope), joins to session_raw.envelopes by source_id."
      - "Worker upserts session_core.sessions (keyed by provider+provider_session_id) and inserts a session_core.turns row per envelope."
      - "Worker marks the outbox row done on success, or failed/dead_letter with attempts incremented on error — never leaves a processed row silently pending forever."
      - "Worker does not call any external LLM/HTTP service."
      - "Tests run end-to-end against a real Postgres instance: insert_envelope() -> trigger creates outbox row -> worker run -> session_core rows verified -> outbox marked done."
    required_evidence:
      - "End-to-end test output: envelope insert, outbox row creation, worker run, session_core.sessions/turns rows, outbox status — quoted, not paraphrased."
      - "Error-path test: a malformed/missing envelope reference results in failed/dead_letter, not a crash or a silently-stuck pending row."
    forbidden_shortcuts:
      - "worker calls external LLM/HTTP"
      - "mocked outbox/session_raw rows as proof of working projection"

  - job_id: "session-chunk-indexer-001"
    phase: "3"
    target_repo: "cic-mcp-session"
    change_type: "new_capability"
    status_after_merge: "experimental"
    goal: "Implement a worker that chunks session_core.turns.content into session_core.chunks, populates session_idx.chunk_fts (tsvector) and session_idx.chunk_embeddings (local embedding model, pinning the dimension the schema's own comment deferred to this job), via a new session_jobs.outbox job_type ('index_turn') enqueued by an additive trigger on session_core.turns."
    prerequisites:
      - "session-turn-projector-001"
    required_context:
      - ".cic-context/factory-docs/architecture.md#Schema szeparacio"
      - ".cic-context/factory-docs/execution-phases.md#Phase 3"
    output_files:
      - "output/session-chunk-indexer-report.md"
    acceptance_gates:
      - "An additive, idempotent DDL migration adds a trigger on session_core.turns that enqueues a session_jobs.outbox row (job_type='index_turn'), applied on top of the existing session-postgres-schema.sql against a real Postgres instance without error."
      - "A deterministic, documented chunking strategy (fixed-size or regex-boundary splitting, not an AI/LLM decision) splits turns.content into 1+ session_core.chunks rows."
      - "session_idx.chunk_fts.tsv is populated per chunk via to_tsvector."
      - "session_idx.chunk_embeddings is populated using a LOCAL embedding model (e.g. sentence-transformers, already in requirements.in) — not a call to an external LLM/HTTP embedding API; the chosen model name and VECTOR(N) dimension are documented, and the schema's VECTOR(1536) placeholder is adjusted via migration if the real model's dimension differs, with justification."
      - "The index_turn outbox row resolves to done/failed/dead_letter using the same per-row-transaction pattern as session-turn-projector-001's turn_projector."
      - "Tests run end-to-end against a real Postgres instance: turn insert -> trigger enqueues index_turn job -> worker run -> chunks/chunk_fts/chunk_embeddings rows verified -> outbox marked done."
    required_evidence:
      - "End-to-end test output: turn insert, outbox row creation, worker run, chunks/chunk_fts/chunk_embeddings rows, outbox status — quoted, not paraphrased."
      - "The chosen embedding model name, its real output dimension, and the justification for it (or for adjusting the schema's VECTOR(1536) placeholder) — quoted."
      - "The migration SQL diff (new trigger, and any column type adjustment) — quoted."
    forbidden_shortcuts:
      - "embedding generation via an external LLM/HTTP API (OpenAI, Anthropic, etc.) instead of a local model"
      - "AI/LLM-based decision about chunk boundaries instead of deterministic fixed-size/regex splitting"
      - "mocked chunk_fts/chunk_embeddings rows as proof of a working indexer"

  - job_id: "session-retrieval-quality-001"
    phase: "3"
    target_repo: "cic-mcp-session"
    change_type: "enhancement"
    status_after_merge: "experimental"
    goal: "Validate the session_api.* read-path SQL functions (search_context, get_timeline, get_context_pack, session_status) against a realistic multi-turn, bilingual (Hungarian/English) session fixture built through the full real chain (insert_envelope -> turn_projector -> chunk_indexer), and fix any integration bugs found between the read-path and the two existing outbox workers."
    prerequisites:
      - "session-turn-projector-001"
      - "session-chunk-indexer-001"
    required_context:
      - ".cic-context/factory-docs/architecture.md#Schema szeparacio"
      - ".cic-context/factory-docs/execution-phases.md#Phase 3"
    output_files:
      - "output/session-retrieval-quality-report.md"
    acceptance_gates:
      - "A realistic test fixture (several envelopes, mixed Hungarian/English content) is built through the real chain (insert_envelope -> turn_projector.run_projection_batch -> chunk_indexer.run_indexing_batch), not via direct INSERTs that bypass the workers."
      - "session_api.search_context() is tested against this fixture with known query terms; the to_tsvector('simple', ...) (chunk_indexer) vs plainto_tsquery('english', ...) (search_context) configuration mismatch is explicitly tested with a case where English stemming would matter (e.g. content contains an inflected form, query uses the base form), and the result (match or miss) is documented, not assumed — if it causes real, undesirable misses, an additive migration fixing the inconsistency is implemented and justified."
      - "session_api.get_timeline() and session_api.get_context_pack() are tested against the same fixture with real multi-turn data and asserted ordering."
      - "session_api.session_status() is tested against the same fixture; the pending_jobs subquery's assumption that every session_jobs.outbox payload contains an 'event_id' key is explicitly checked against BOTH outbox job_types currently in use (project_envelope has 'event_id', index_turn does not, per the existing trigger definitions) — if this causes an undercount, it is documented as a Risk or fixed via an additive migration, not silently ignored."
      - "All claims about query results are backed by actual function-call output against a real Postgres instance, not by reasoning about the SQL alone."
    required_evidence:
      - "Actual SQL function call output (e.g. via psql or psycopg) for each of the 4 session_api functions against the real fixture — quoted, not paraphrased."
      - "The to_tsvector/tsquery language-config test result, quoted, with an explicit statement of whether it matches expectations."
      - "The session_status() pending_jobs behavior across both job_types, quoted, with an explicit statement of whether it undercounts."
    forbidden_shortcuts:
      - "testing session_api functions only against hand-crafted rows inserted directly into session_core/session_idx tables, bypassing the real envelope_writer/turn_projector/chunk_indexer chain"
      - "assuming the to_tsvector('simple')/plainto_tsquery('english') combination works without an actual query-and-assert test against a stemming-sensitive case"
      - "assuming session_status()'s pending_jobs count is correct without testing it against an index_turn outbox row"

  - job_id: "session-vector-search-api-001"
    phase: "3"
    target_repo: "cic-mcp-session"
    change_type: "new_capability"
    status_after_merge: "experimental"
    goal: "Add a session_api SQL function that queries session_idx.chunk_embeddings via pgvector cosine similarity (the HNSW index already exists but is never queried by any session_api function), and a Python helper that embeds a query string with the same local model chunk_indexer uses, so the embeddings session-chunk-indexer-001 writes are actually read by something for the first time."
    prerequisites:
      - "session-chunk-indexer-001"
      - "session-retrieval-quality-001"
    required_context:
      - ".cic-context/factory-docs/architecture.md#Schema szeparacio"
      - ".cic-context/factory-docs/execution-phases.md#Phase 3"
    output_files:
      - "output/session-vector-search-api-report.md"
    acceptance_gates:
      - "An additive migration adds a session_api SQL function (e.g. search_context_vector) that orders session_core.chunks by cosine distance to a caller-supplied query embedding (VECTOR(384), matching session-chunk-indexer-001's corrected dimension), scoped to a session_id, using the existing idx_session_idx_chunk_embeddings_hnsw index."
      - "A Python helper embeds a query string with the SAME local model chunk_indexer.py uses (reused, not reimplemented) — not an external LLM/HTTP embedding API — to produce the vector passed into the new SQL function."
      - "A real, multi-topic fixture (at least 2 turns about clearly distinct topics, built through the real insert_envelope -> turn_projector -> chunk_indexer chain) is used to prove the function returns the semantically closer chunk first for a query about one of the two topics — not just that the function executes without error."
      - "The new function's result ordering is verified to actually use the HNSW index (e.g. EXPLAIN output showing an index scan, not a sequential scan with a manual sort), or, if the planner chooses a sequential scan at this fixture's tiny row count, that is explicitly documented as expected-at-small-scale, not silently accepted as 'index works'."
    required_evidence:
      - "Actual SQL function call output for at least 2 distinct queries against a real multi-topic fixture, quoted, showing the semantically relevant chunk ranked first."
      - "EXPLAIN (or equivalent) output for the new function's query, quoted, with an explicit statement of whether the HNSW index was used."
      - "The query-embedding helper's actual output dimension, queried, matching session_idx.chunk_embeddings.embedding's declared VECTOR(384)."
    forbidden_shortcuts:
      - "query embedding generated via an external LLM/HTTP API instead of the existing local model"
      - "testing only that the function returns SOME rows without error, instead of asserting the semantically correct chunk ranks first on a real multi-topic fixture"
      - "assuming the HNSW index is used without checking EXPLAIN output"

  - job_id: "session-hybrid-search-api-001"
    phase: "3"
    target_repo: "cic-mcp-session"
    change_type: "new_capability"
    status_after_merge: "experimental"
    goal: "Add a session_api SQL function that combines the existing search_context() (FTS, 'simple' config) and search_context_vector() (cosine similarity) signals into one ranked result, using a documented, justified fusion method (e.g. reciprocal rank fusion), and prove on a real fixture that the combined function surfaces both a lexical-only-relevant chunk and a semantic-only-relevant chunk, where querying with either single method alone would surface only one of the two."
    prerequisites:
      - "session-retrieval-quality-001"
      - "session-vector-search-api-001"
    required_context:
      - ".cic-context/factory-docs/architecture.md#Schema szeparacio"
      - ".cic-context/factory-docs/execution-phases.md#Phase 3"
    output_files:
      - "output/session-hybrid-search-api-report.md"
    acceptance_gates:
      - "An additive migration adds a session_api SQL function (e.g. search_context_hybrid) that accepts both a query text (for the FTS side, reusing search_context()'s plainto_tsquery('simple', ...) approach) and a caller-supplied query embedding (for the vector side, reusing search_context_vector()'s cosine-distance approach), and combines the two rankings via a documented, justified fusion method."
      - "The fusion method choice (e.g. reciprocal rank fusion vs. normalized weighted sum) is justified given that ts_rank and cosine similarity are not on comparable scales — this tradeoff must be addressed explicitly, not glossed over."
      - "A real fixture (built through the real insert_envelope -> turn_projector -> chunk_indexer chain) contains at least 3 chunks: one with an exact lexical match to the test query but low semantic relevance, one with high semantic relevance but no lexical overlap with the query, and one irrelevant control chunk."
      - "It is proven, via actual function calls against this fixture, that: (a) search_context() alone finds the lexical-match chunk but not the semantic-only chunk for the test query; (b) search_context_vector() alone ranks the semantic-only chunk highly but not necessarily the lexical-match chunk; (c) the new hybrid function ranks BOTH the lexical-match and the semantic-only chunk above the irrelevant control chunk."
    required_evidence:
      - "Actual SQL function call output for all three functions (search_context, search_context_vector, search_context_hybrid) against the same fixture and query, quoted, showing the ranking difference that justifies the hybrid approach existing at all."
      - "The fusion formula itself, quoted from the migration SQL, with the scale-mismatch justification quoted from the report."
    forbidden_shortcuts:
      - "combining ts_rank and cosine similarity via a naive unjustified weighted sum without addressing the scale-mismatch problem"
      - "a fixture where the hybrid result would look the same as either single-method result — the fixture must be constructed so the two methods actually disagree, proving the fusion does real work"
      - "reimplementing FTS or vector search logic instead of reusing search_context()'s and search_context_vector()'s existing query expressions"

  - job_id: "session-worker-scheduler-001"
    phase: "3"
    target_repo: "cic-mcp-session"
    change_type: "new_capability"
    status_after_merge: "experimental"
    goal: "Add a bounded, testable polling loop that repeatedly invokes turn_projector.run_projection_batch() and chunk_indexer.run_indexing_batch() on an interval, plus a documented systemd timer/service unit pair (or cron line) as the production deployment mechanism, closing the 'scaffold' reachability gap both workers have carried since their own jobs (no code outside their own CLI/tests has ever called them)."
    prerequisites:
      - "session-turn-projector-001"
      - "session-chunk-indexer-001"
    required_context:
      - ".cic-context/factory-docs/architecture.md#Schema szeparacio"
      - ".cic-context/factory-docs/execution-phases.md#Phase 3"
    output_files:
      - "output/session-worker-scheduler-report.md"
    acceptance_gates:
      - "A polling-loop entrypoint (e.g. session_store/worker_loop.py) calls the EXISTING turn_projector.run_projection_batch() and chunk_indexer.run_indexing_batch() each iteration — not reimplemented — and supports a bounded iteration count (e.g. --max-iterations) so it is testable without an infinite loop in CI."
      - "A real, multi-envelope backlog (built through the real insert_envelope chain, NOT manually invoking the workers first) is drained across MORE THAN ONE polling iteration by the loop alone, proven by querying session_core.turns/chunks and session_idx.chunk_embeddings after the loop finishes with no manual worker invocation in between."
      - "A documented systemd timer+service unit pair (or cron line) is provided as the intended production deployment mechanism for the loop, with an EXPLICIT, honest statement that this repo has no live production Postgres instance yet, so the unit file is a documented deployment artifact, not a claim that it is actually running anywhere — 'documented' and 'deployed' must not be conflated."
      - "The loop handles an empty backlog (nothing pending) without erroring across iterations."
    required_evidence:
      - "Actual test output: N envelopes inserted, loop run with --max-iterations > 1, all N envelopes' turns/chunks/embeddings present afterward, with the per-iteration progress (e.g. how many jobs were drained on each iteration) quoted, not paraphrased — proving the LOOP drained the backlog over time, not a single batch call."
      - "The systemd/cron unit file content, quoted, with the explicit non-deployment disclaimer quoted from the report."
    forbidden_shortcuts:
      - "testing only a single iteration that processes everything at once — this does not prove the looping/scheduling aspect, only that the underlying batch functions work (already proven by prior jobs)"
      - "claiming the unit file is 'deployed' or 'running in production' when no live production Postgres exists for this repo"
      - "reimplementing turn_projector/chunk_indexer batch logic inside the loop instead of calling the existing functions"

  - job_id: "session-source-refs-extractor-001"
    phase: "3"
    target_repo: "cic-mcp-session"
    change_type: "enhancement"
    status_after_merge: "experimental"
    goal: "Populate session_core.source_refs (the last unfilled session_core table) by extracting deterministic provenance references (tool_call name, file path, URL) from each chunk's source envelope payload/text during chunk_indexer's existing index_turn processing — not via a new outbox job_type, since source_refs.chunk_id requires the chunk to already exist in the same transaction."
    prerequisites:
      - "session-chunk-indexer-001"
    required_context:
      - ".cic-context/factory-docs/architecture.md#Schema szeparacio"
      - ".cic-context/factory-docs/execution-phases.md#Phase 3"
    output_files:
      - "output/session-source-refs-extractor-report.md"
    acceptance_gates:
      - "A deterministic (non-AI/LLM) extraction function derives 0+ session_core.source_refs rows per chunk from the chunk's source envelope payload and/or extracted text: ref_kind='tool_call' (from a known tool-event payload shape), ref_kind='file' (from a known file-path-bearing payload key), ref_kind='url' (via a fixed regex over the chunk text) — the exact key/pattern matching rules are documented and justified."
