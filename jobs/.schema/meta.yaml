schema_version: "1.0"

# Identification
job_id: ""                  # unique, e.g. "workdir-get-diff-001"
parent_job_id: ""           # parent job id if this is a child job; "" for root

# Hierarchy level
level: ""                   # orchestrator | capability

# Capability — what this job produces
capability:
  id: ""                     # e.g. "cic_mcp.workdir.get_diff"
  target_repo: ""            # which cic-mcp-* repo this capability belongs to
  change_type: ""            # new_capability | fix | enhancement
  status_after_merge: ""     # experimental | candidate | canonical

# KB context
kb_focus: []                # focus_pack node-ids or tags, e.g. ["mcp", "trust-domain"]
promptmap_ref: ""           # key in ai/PROMPTMAP.yaml; "" if not applicable

# Agent
agent:
  config_dir: ""            # CLAUDE_CONFIG_DIR value, e.g. "~/.claude-personal/agents/agent-01"
  model: ""                 # e.g. "claude-sonnet-4-6"
  session_id: ""            # optional; Claude Code session UUID, set by run-job.sh after each run.
                             # Used by `run-job.sh <job-id> <agent-id> --resume` to continue
                             # exactly where a session-limit/error cutoff happened.

# Workplace — agent saját klónjában, nem a live workdir-ban.
# "cic-mcp-factory" mindig automatikusan klónozva van, NE vedd fel ide.
# capability.target_repo automatikusan a klónozási unióba kerül, ha nincs itt felsorolva.
workplace:
  repos: []                 # további klónozandó repók, pl. ["cic-mcp-workdir", "cic-mcp-knowledge"]
  branch: ""                # feature branch neve, pl. "feature/<job-id>"

# Status
status: "pending"           # pending | running | agent_done | done | error
# pending      — spec megírva, még nem indult
# running      — agent fut (run-job.sh vagy Agent tool)
# agent_done   — a Claude folyamat sikeresen lefutott (exit 0), DE ez nem bizonyítja hogy
#                az output/target-repo evidence teljes — exit code 0 != kész capability-job
# done         — /job-close lezárta: review megtörtént, run-evidence.md ellenőrizve
# error        — a futás hibával állt le; --resume-mal folytatható
error_message: ""           # only when status: error

# Timestamps (ISO 8601)
timestamps:
  created: ""
  started: ""
  completed: ""
